<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тәрбие Quiz — Семинар</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#0b0b1e;
            color:#f0f0ff;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
        }
        .bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
        .bg .orb { position:absolute; border-radius:50%; filter:blur(100px); opacity:.2; animation:drift 20s infinite ease-in-out alternate; }
        .bg .orb:nth-child(1){width:500px;height:500px;background:#7c3aed;top:-10%;left:-5%;}
        .bg .orb:nth-child(2){width:400px;height:400px;background:#06b6d4;bottom:-5%;right:-5%;animation-delay:-7s;}
        .bg .orb:nth-child(3){width:350px;height:350px;background:#ec4899;top:40%;left:45%;animation-delay:-14s;}
        @keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,-30px) scale(1.1)}100%{transform:translate(-30px,40px) scale(.95)}}

        .container {
            position:relative; z-index:1;
            text-align:center;
            padding:2rem;
            animation:fadeIn .8s ease;
        }
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

        .logo-icon {
            width:100px; height:100px;
            border-radius:28px;
            background:linear-gradient(135deg,#7c3aed,#06b6d4);
            display:inline-flex; align-items:center; justify-content:center;
            font-size:2.5rem; color:white;
            margin-bottom:2rem;
            box-shadow:0 15px 50px rgba(124,58,237,.4);
        }
        h1 {
            font-family:'Outfit',sans-serif;
            font-size:clamp(2.5rem,6vw,4rem);
            font-weight:900; letter-spacing:-2px;
            margin-bottom:.5rem;
        }
        h1 span { background:linear-gradient(135deg,#7c3aed,#06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .sub { color:rgba(240,240,255,.5); font-size:1.1rem; margin-bottom:3rem; }

        .buttons { display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap; }
        .btn {
            display:inline-flex; align-items:center; gap:12px;
            padding:20px 40px;
            border-radius:20px;
            font-family:'Inter',sans-serif;
            font-size:1.1rem; font-weight:700;
            text-decoration:none; color:white;
            transition:all .3s ease;
            border:2px solid transparent;
            cursor:pointer;
        }
        .btn i { font-size:1.3rem; }
        .btn-host {
            background:linear-gradient(135deg,#7c3aed,#6c3aed);
            box-shadow:0 8px 30px rgba(124,58,237,.35);
        }
        .btn-host:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(124,58,237,.5); }
        .btn-play {
            background:rgba(255,255,255,.06);
            border-color:rgba(255,255,255,.15);
        }
        .btn-play:hover { transform:translateY(-4px); background:rgba(255,255,255,.1); border-color:rgba(6,182,212,.5); }

        .footer { position:fixed; bottom:2rem; left:0; right:0; text-align:center; color:rgba(240,240,255,.3); font-size:.85rem; z-index:1; }
    </style>
</head>
<body>
    <div class="bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div class="container">
        <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
        <h1>Тәрбие <span>Quiz</span></h1>
        <p class="sub">Тәрбиеші семинары — интерактивті тест жарысы</p>
        <div class="buttons">
            <a href="host.html" class="btn btn-host"><i class="fas fa-display"></i> Ойын бастау</a>
            <a href="play.html" class="btn btn-play"><i class="fas fa-mobile-screen"></i> Ойынға кіру</a>
        </div>
    </div>
    <div class="footer">Тәрбие 1.0 – 3.0 семинар тест жүйесі</div>
</body>
</html>
